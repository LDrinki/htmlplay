name: HTMLplay — Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress deploys on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    name: Build + Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Checkout ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Setup Node ─────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Build Pipeline ─────────────────────────────────────
      - name: Generate JSON database (chunks + index)
        run: node pipeline/generate-db.js
        env:
          NODE_ENV: production

      - name: Generate sitemaps + robots.txt
        run: node pipeline/generate-sitemap.js
        env:
          SITE_URL: https://htmlplay.io

      - name: Optimise thumbnails (WebP conversion)
        run: node pipeline/optimize-images.js
        continue-on-error: true   # Don't fail deploy if image conversion fails

      - name: Detect broken game links
        run: node pipeline/check-links.js
        continue-on-error: true   # Warn only, don't block deploy

      - name: Validate JSON output
        run: |
          echo "Validating generated JSON..."
          node -e "
            const fs = require('fs');
            const index = JSON.parse(fs.readFileSync('./data/games-index.json'));
            console.log('Index: OK —', index.total, 'games,', index.totalChunks, 'chunks');
            const chunk0 = JSON.parse(fs.readFileSync('./data/chunks/chunk-000.json'));
            console.log('Chunk 0: OK —', chunk0.games.length, 'games');
          "

      # ── Lighthouse CI (PR only) ────────────────────────────
      - name: Run Lighthouse CI
        if: github.event_name == 'pull_request'
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost/
            http://localhost/game/subway-surfers-unblocked
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true

      # ── Deploy: Preview (PR) ───────────────────────────────
      - name: Deploy Preview to Cloudflare Pages
        if: github.event_name == 'pull_request'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: htmlplay
          directory: '.'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: preview/${{ github.head_ref }}
        id: preview-deploy

      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview deployed!**\n\n🔗 ${process.env.PREVIEW_URL}\n\n📊 Lighthouse CI results attached above.`
            })
        env:
          PREVIEW_URL: ${{ steps.preview-deploy.outputs.url }}

      # ── Deploy: Production (main) ──────────────────────────
      - name: Deploy Production to Cloudflare Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: htmlplay
          directory: '.'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      # ── Post-deploy: Purge Cloudflare Cache ────────────────
      - name: Purge Cloudflare CDN cache (HTML + index files)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{
              "files": [
                "https://htmlplay.io/",
                "https://htmlplay.io/data/games-index.json",
                "https://htmlplay.io/data/config.json",
                "https://htmlplay.io/sitemap.xml"
              ]
            }'

      # ── Notify ─────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          echo "───────────────────────────────"
          echo "✅ HTMLplay deployed successfully"
          echo "📊 Games in database: $(node -e "const i=require('./data/games-index.json');console.log(i.total)")"
          echo "📦 Chunks generated:  $(ls data/chunks/ | wc -l)"
          echo "───────────────────────────────"
